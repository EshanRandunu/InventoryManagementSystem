spring.application.name=backend
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/spring
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 1. Tell Spring Boot to load the .env file
# The [.properties] part tells Spring to read it as standard key=value pairs
spring.config.import=optional:file:backend/.env[.properties]

# 2. Reference the variables from the .env file using ${}
spring.datasource.username=root
spring.datasource.password=1234

stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}

# Non-sensitive configs stay here
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.jpa.show-sql=true